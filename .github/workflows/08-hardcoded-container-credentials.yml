name: Integration tests (hardcoded registry credentials)
on: [push]

# 同じブランチの古い実行を自動キャンセルし、無駄な課金を防ぐ
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/example/private-runner:latest
      credentials:
        username: ci-bot
        password: hunter2-plaintext-password
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make integration-test
