name: Issue triage (template injection)
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Echo title
        run: |
          echo "New issue: ${{ github.event.issue.title }}"
          echo "Body: ${{ github.event.issue.body }}"
