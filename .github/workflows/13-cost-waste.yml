# コスト浪費パターンのデモ(セキュリティではなく費用の問題)
name: cost-waste
on:
  push:
  pull_request:
  schedule:
    - cron: "*/10 * * * *"
# 同じブランチの古い実行を自動キャンセルし、無駄な課金を防ぐ
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - run: npm ci
      - run: npm test
