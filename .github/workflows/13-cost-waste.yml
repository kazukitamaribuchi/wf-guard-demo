# コスト浪費パターンのデモ(セキュリティではなく費用の問題)
name: cost-waste
on:
  push:
  pull_request:
  schedule:
    - cron: "*/10 * * * *"
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - run: npm ci
      - run: npm test
