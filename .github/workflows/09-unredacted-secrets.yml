name: Debug (unredacted secrets)
on: [push]

# 同じブランチの古い実行を自動キャンセルし、無駄な課金を防ぐ
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Dump structured secret
        run: |
          echo '${{ toJson(secrets) }}' > /tmp/secrets.json
          cat /tmp/secrets.json
